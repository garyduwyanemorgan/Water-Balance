# Render Blueprint — auto-configures the Streamlit web service.
# Free tier: app sleeps after 15 min idle, ~30 s cold start on next visit.
services:
  - type: web
    name: fah-water-balance
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: >-
      streamlit run app.py
      --server.port $PORT
      --server.address 0.0.0.0
      --server.headless true
      --server.enableCORS false
      --server.enableXsrfProtection false
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
